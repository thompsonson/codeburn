name: Fork Release

on:
  push:
    tags:
      - 'v*-thompsonson.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build
      - run: npm pack --pack-destination .
      - run: mv codeburn-*.tgz codeburn.tgz
      - uses: softprops/action-gh-release@v2
        with:
          files: codeburn.tgz
